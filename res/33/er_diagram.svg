  <ellipse cx="555" cy="648" rx="32" ry="16" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="555" y="652" text-anchor="middle" font-size="11" fill="#1e293b">分享ID</text>
  <ellipse cx="610" cy="660" rx="32" ry="16" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="610" y="664" text-anchor="middle" font-size="11" fill="#1e293b">提取码</text>
  <ellipse cx="670" cy="668" rx="38" ry="16" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="670" y="672" text-anchor="middle" font-size="11" fill="#1e293b">创建时间</text>
  <ellipse cx="742" cy="660" rx="38" ry="16" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="742" y="664" text-anchor="middle" font-size="11" fill="#1e293b">过期时间</text>
  <ellipse cx="800" cy="640" rx="38" ry="16" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="800" y="644" text-anchor="middle" font-size="11" fill="#1e293b">分享状态</text>
  <!-- 连线 -->
  <line x1="610" y1="604" x2="563" y2="632" stroke="#f97316" stroke-width="1"/>
  <line x1="630" y1="604" x2="614" y2="644" stroke="#f97316" stroke-width="1"/>
  <line x1="650" y1="604" x2="668" y2="652" stroke="#f97316" stroke-width="1"/>
  <line x1="675" y1="604" x2="738" y2="644" stroke="#f97316" stroke-width="1"/>
  <line x1="700" y1="604" x2="790" y2="626" stroke="#f97316" stroke-width="1"/>

  <!-- ===================== 关系菱形 ===================== -->

  <!-- 管理 关系（管理员 - 用户） -->
  <polygon points="230,82 265,96 230,110 195,96" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="230" y="100" text-anchor="middle" font-size="12" fill="#1e293b">管理</text>
  <line x1="150" y1="82" x2="195" y2="92" stroke="#64748b" stroke-width="1.5"/>
  <line x1="265" y1="96" x2="390" y2="86" stroke="#64748b" stroke-width="1.5"/>
  <text x="168" y="78" font-size="11" fill="#64748b">1</text>
  <text x="355" y="82" font-size="11" fill="#64748b">N</text>

  <!-- 拥有文件夹 关系（用户 - 文件夹） -->
  <polygon points="390,240 425,254 390,268 355,254" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="258" text-anchor="middle" font-size="12" fill="#1e293b">拥有</text>
  <line x1="430" y1="104" x2="400" y2="240" stroke="#64748b" stroke-width="1.5"/>
  <line x1="355" y1="256" x2="300" y2="314" stroke="#64748b" stroke-width="1.5"/>
  <text x="426" y="165" font-size="11" fill="#64748b">1</text>
  <text x="322" y="308" font-size="11" fill="#64748b">N</text>

  <!-- 拥有文件 关系（用户 - 文件） -->
  <polygon points="510,240 545,254 510,268 475,254" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="510" y="258" text-anchor="middle" font-size="12" fill="#1e293b">拥有</text>
  <line x1="468" y1="104" x2="500" y2="240" stroke="#64748b" stroke-width="1.5"/>
  <line x1="545" y1="256" x2="595" y2="318" stroke="#64748b" stroke-width="1.5"/>
  <text x="476" y="165" font-size="11" fill="#64748b">1</text>
  <text x="574" y="312" font-size="11" fill="#64748b">N</text>

  <!-- 包含文件 关系（文件夹 - 文件） -->
  <polygon points="420,332 455,346 420,360 385,346" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="350" text-anchor="middle" font-size="12" fill="#1e293b">包含</text>
  <line x1="300" y1="332" x2="385" y2="344" stroke="#64748b" stroke-width="1.5"/>
  <line x1="455" y1="346" x2="590" y2="334" stroke="#64748b" stroke-width="1.5"/>
  <text x="316" y="338" font-size="11" fill="#64748b">1</text>
  <text x="568" y="330" font-size="11" fill="#64748b">N</text>

  <!-- 移入回收站 关系（文件/文件夹 - 回收站） -->
  <polygon points="390,480 425,494 390,508 355,494" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="490" text-anchor="middle" font-size="12" fill="#1e293b">移入</text>
  <text x="390" y="503" text-anchor="middle" font-size="11" fill="#64748b">回收站</text>
  <line x1="240" y1="354" x2="360" y2="482" stroke="#64748b" stroke-width="1.5"/>
  <line x1="355" y1="494" x2="300" y2="562" stroke="#64748b" stroke-width="1.5"/>
  <text x="276" y="428" font-size="11" fill="#64748b">N</text>
  <text x="314" y="558" font-size="11" fill="#64748b">1</text>

  <!-- 创建分享 关系（用户 - 分享） -->
  <polygon points="650,450 685,464 650,478 615,464" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="650" y="468" text-anchor="middle" font-size="12" fill="#1e293b">创建</text>
  <line x1="470" y1="100" x2="644" y2="450" stroke="#64748b" stroke-width="1.5"/>
  <line x1="650" y1="478" x2="650" y2="560" stroke="#64748b" stroke-width="1.5"/>
  <text x="592" y="295" font-size="11" fill="#64748b">1</text>
  <text x="654" y="545" font-size="11" fill="#64748b">N</text>

  <!-- 关联分享 关系（文件/文件夹 - 分享） -->
  <polygon points="560,464 595,478 560,492 525,478" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="560" y="482" text-anchor="middle" font-size="12" fill="#1e293b">关联</text>
  <line x1="300" y1="348" x2="524" y2="472" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="595" y1="478" x2="615" y2="476" stroke="#64748b" stroke-width="1.5"/>
  <line x1="650" y1="354" x2="574" y2="465" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="425" font-size="11" fill="#64748b">N</text>
  <text x="612" y="425" font-size="11" fill="#64748b">N</text>

  <!-- 图例 -->
  <rect x="30" y="710" width="14" height="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <text x="50" y="722" font-size="11" fill="#475569">用户相关</text>
  <rect x="140" y="710" width="14" height="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1" rx="2"/>
  <text x="160" y="722" font-size="11" fill="#475569">文件/文件夹</text>
  <rect x="270" y="710" width="14" height="14" fill="#fee2e2" stroke="#ef4444" stroke-width="1" rx="2"/>
  <text x="290" y="722" font-size="11" fill="#475569">回收站</text>
  <rect x="370" y="710" width="14" height="14" fill="#ffedd5" stroke="#f97316" stroke-width="1" rx="2"/>
  <text x="390" y="722" font-size="11" fill="#475569">分享</text>
  <rect x="450" y="710" width="14" height="14" fill="#fef9c3" stroke="#eab308" stroke-width="1" rx="2"/>
  <text x="470" y="722" font-size="11" fill="#475569">管理员</text>
  <line x1="540" y1="717" x2="570" y2="717" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="578" y="722" font-size="11" fill="#475569">多对多关联</text>
