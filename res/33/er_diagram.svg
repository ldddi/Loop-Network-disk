  <ellipse cx="248" cy="265" rx="38" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="248" y="269" text-anchor="middle" font-size="11" fill="#1e293b">创建时间</text>
  <ellipse cx="318" cy="272" rx="44" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="318" y="276" text-anchor="middle" font-size="11" fill="#1e293b">父级目录ID</text>
  <!-- 连线 -->
  <line x1="200" y1="310" x2="128" y2="300" stroke="#22c55e" stroke-width="1"/>
  <line x1="210" y1="310" x2="182" y2="288" stroke="#22c55e" stroke-width="1"/>
  <line x1="240" y1="310" x2="246" y2="281" stroke="#22c55e" stroke-width="1"/>
  <line x1="270" y1="310" x2="308" y2="288" stroke="#22c55e" stroke-width="1"/>

