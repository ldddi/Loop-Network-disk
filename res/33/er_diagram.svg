  <text x="450" y="87" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">用户</text>
  <!-- 属性 -->
  <ellipse cx="310" cy="48" rx="32" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="310" y="52" text-anchor="middle" font-size="11" fill="#1e293b">用户ID</text>
  <ellipse cx="370" cy="30" rx="32" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="370" y="34" text-anchor="middle" font-size="11" fill="#1e293b">用户名</text>
  <ellipse cx="450" cy="22" rx="28" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="450" y="26" text-anchor="middle" font-size="11" fill="#1e293b">密码</text>
  <ellipse cx="530" cy="30" rx="28" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="530" y="34" text-anchor="middle" font-size="11" fill="#1e293b">头像</text>
  <ellipse cx="590" cy="48" rx="28" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="590" y="52" text-anchor="middle" font-size="11" fill="#1e293b">状态</text>
  <ellipse cx="340" cy="110" rx="38" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="340" y="114" text-anchor="middle" font-size="11" fill="#1e293b">已用容量</text>
  <ellipse cx="560" cy="110" rx="38" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="560" y="114" text-anchor="middle" font-size="11" fill="#1e293b">容量上限</text>
  <!-- 连线 -->
  <line x1="410" y1="60" x2="332" y2="56" stroke="#3b82f6" stroke-width="1"/>
