  <ellipse cx="560" cy="265" rx="32" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="560" y="269" text-anchor="middle" font-size="11" fill="#1e293b">文件ID</text>
  <ellipse cx="620" cy="258" rx="32" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="620" y="262" text-anchor="middle" font-size="11" fill="#1e293b">文件名</text>
  <ellipse cx="690" cy="255" rx="38" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
