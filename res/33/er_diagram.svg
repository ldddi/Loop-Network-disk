  <ellipse cx="820" cy="375" rx="38" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="820" y="379" text-anchor="middle" font-size="11" fill="#1e293b">上传时间</text>
  <!-- 连线 -->
  <line x1="610" y1="310" x2="568" y2="281" stroke="#22c55e" stroke-width="1"/>
  <line x1="625" y1="310" x2="622" y2="274" stroke="#22c55e" stroke-width="1"/>
  <line x1="650" y1="310" x2="690" y2="271" stroke="#22c55e" stroke-width="1"/>
  <line x1="670" y1="310" x2="754" y2="278" stroke="#22c55e" stroke-width="1"/>
  <line x1="710" y1="318" x2="790" y2="300" stroke="#22c55e" stroke-width="1"/>
  <line x1="710" y1="332" x2="802" y2="332" stroke="#22c55e" stroke-width="1"/>
  <line x1="710" y1="346" x2="790" y2="364" stroke="#22c55e" stroke-width="1"/>

  <!-- 回收站 实体 -->
  <rect x="180" y="560" width="120" height="44" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="240" y="587" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">回收站</text>
