<svg width="960" height="780" xmlns="http://www.w3.org/2000/svg" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">
  <!-- 背景 -->
  <rect width="960" height="780" fill="#f8fafc" rx="12"/>
  <!-- 标题 -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">个人云存储网盘系统 E-R 图</text>

  <!-- ===================== 实体定义 ===================== -->

  <!-- 管理员 实体 -->
  <rect x="30" y="60" width="120" height="44" fill="#fef9c3" stroke="#eab308" stroke-width="2" rx="4"/>
  <text x="90" y="87" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">管理员</text>
  <!-- 属性 -->
  <ellipse cx="30" cy="130" rx="38" ry="16" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
  <text x="30" y="134" text-anchor="middle" font-size="11" fill="#1e293b">管理员ID</text>
  <ellipse cx="90" cy="150" rx="32" ry="16" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
  <text x="90" y="154" text-anchor="middle" font-size="11" fill="#1e293b">用户名</text>
  <ellipse cx="150" cy="130" rx="28" ry="16" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
  <text x="150" y="134" text-anchor="middle" font-size="11" fill="#1e293b">密码</text>
  <!-- 连线 -->
  <line x1="60" y1="104" x2="38" y2="114" stroke="#eab308" stroke-width="1"/>
