  <text x="118" y="294" text-anchor="middle" font-size="11" fill="#1e293b">文件夹ID</text>
  <ellipse cx="178" cy="272" rx="38" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
